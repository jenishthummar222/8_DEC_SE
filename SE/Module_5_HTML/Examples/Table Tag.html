<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>

<style>
    body {
        background-color: rgb(68, 205, 50);
        text-align: center;
    }
    
    table {
        border: 3px solid white;
        border-collapse: collapse;
        width: 100%;
        color: aliceblue;
        margin-top: 15px;
    }
    
    table thead tr th {
        border: none;
        text-align: center;
        color: blue;
    }
    
    tbody tr,
    td {
        border: 2px solid white;
        height: 50px;
    }
    
    #red {
        background-color: red;
    }
    
    #black {
        background-color: black;
    }
    
    label {
        color: black;
        font-size: x-large;
        font-family: Arial, Helvetica, sans-serif;
        padding: 10px;
        margin: 100px;
    }
</style>

<body>
    <h1>European Roulette</h1>
    <table>

        <tbody>
            <tr>
                <td rowspan="5">0</td>
                <td id="red">3</td>
                <td id="black">6</td>
                <td id="red">9</td>
                <td id="red">12</td>
                <td id="black">15</td>
                <td id="red">18</td>
                <td id="red">21</td>
                <td id="black">24</td>
                <td id="red">27</td>
                <td id="red">30</td>
                <td id="black">33</td>
                <td id="red">36</td>
                <td style="text-align: start;">2to1</td>
            </tr>
            <tr>
                <td id="black">2</td>
                <td id="red">5</td>
                <td id="black">8</td>
                <td id="black">11</td>
                <td id="red">14</td>
                <td id="black">17</td>
                <td id="black">20</td>
                <td id="red">23</td>
                <td id="black">26</td>
                <td id="black">29</td>
                <td id="red">32</td>
                <td id="black">35</td>
                <td style="text-align: start;">2to1</td>
            </tr>
            <tr>
                <td id="red">1</td>
                <td id="black">4</td>
                <td id="red">7</td>
                <td id="black">10</td>
                <td id="black">13</td>
                <td id="red">16</td>
                <td id="red">19</td>
                <td id="black">22</td>
                <td id="red">25</td>
                <td id="black">28</td>
                <td id="black">31</td>
                <td id="red">34</td>
                <td style="text-align: start;">2to1</td>
            </tr>
            <tr>
                <td colspan="4">1st12</td>
                <td colspan="4">2nd12</td>
                <td colspan="4">3rd12</td>
                <td rowspan="2">
                </td>
            </tr>
            <tr>
                <td colspan="2 ">1to18</td>
                <td colspan="2 ">EVEN</td>
                <td colspan="2 " id="red"></td>
                <td colspan="2 " id="black"></td>
                <td colspan="2 ">OOD </td>
                <td colspan="2 ">19to36</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
