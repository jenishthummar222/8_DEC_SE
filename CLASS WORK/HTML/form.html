<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>
<style>
    table {
        width: 100%;
    }
    
    tr,
    td {
        padding: 20px;
    }
</style>

<body>

    <table>
        <tbody>
            <form action="">
                <tr>
                    <td>
                        <label>First Name : </label>
                    </td>
                    <td>
                        <input type="text" placeholder="Enter First Name " name="fname" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>Email : </label>
                    </td>
                    <td>
                        <input type="email" placeholder="example@domain.com " name="email" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>Password : </label>
                    </td>
                    <td>
                        <input type="password" placeholder="Enter your password " name="password" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>Gender : </label>
                    </td>
                    <td>
                        <input placeholder="#" type="radio" name="gender">male
                        <input placeholder="#" type="radio" name="gender">female
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>Hobbies : </label>
                    </td>
                    <td>
                        <input type="checkbox" placeholder="#" name="c_check" value="CLanguage">C Language
                        <input type="checkbox" placeholder="#" name="j_check" value="java">Java
                        <input type="checkbox" placeholder="#" name="p_check" value="python">Python

                    </td>
                </tr>
                <tr>
                    <td>
                        <label>City : </label>
                    </td>
                    <td>

                        <select name="city" id="">
                            <option value="#" selected disabled aria-readonly="false"> -- Select Any --</option>
                            <option value="Ahmedabad">Ahmedabad</option>
                            <option value="surat">Surat</option>
                            <option value="Junagadh">Junagadh</option>
                            <option value="Rajkot">Rajkot</option>
                            <option value="Mumbai">Mumbai</option>
                        </select>

                    </td>
                </tr>
                <tr>
                    <td>
                        <label>Address : </label>
                    </td>
                    <td>
                        <textarea name="#" rows="10" cols="25" placeholder="Type Your Address hear.." id=""></textarea>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="SUBMIT">
                    </td>
                </tr>
            </form>
        </tbody>
    </table>

</body>

</html>
