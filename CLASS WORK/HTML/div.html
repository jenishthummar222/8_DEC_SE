<!DOCTYPE html>
<html lang="en">

<head>
    <title>Division Tag</title>
</head>

<style>
    h1 {
        background-color: darkcyan;
        color: white;
        padding: 20px;
        text-align: center;
        border-left: 15px solid rgb(43, 24, 39);
    }
    
    div {
        background-color: rgb(41, 66, 79);
        color: white;
        padding: 20px;
        height: 200px;
    }
    
    body {
        background-color: rgb(27, 39, 45);
    }
</style>

<body>
    <h1>Python-Programing Language</h1>

    <div>
        <h2>Welcome to Python Programing language.</h2>
    </div>

    <h1>Java- Programing Language</h1>
    <div>
        <h2>Welcome to java Programing Language</h2>
    </div>

</body>

</html>
