<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>

<style>
    table {
        border-collapse: collapse;
        width: 100%;
    }
    
    tr,
    td,
    th {
        border: 2px solid rgb(92, 17, 17);
        padding: 5px;
        margin: auto;
    }
    
    th {
        background-color: rgb(10, 1, 34);
        color: rgb(223, 223, 223);
    }
    
    tr,
    td {
        background-color: rgba(87, 127, 137, 0.763);
        color: rgb(18, 2, 2);
        border: 2px solid rgb(7, 2, 2);
    }
    
    body {
        background-color: rgb(223, 223, 223);
        font-size: 20px;
        text-align: center;
    }
</style>

<body>

    <table>
        <thead>
            <tr>
                <th rowspan="3">Day</th>
                <th colspan="3">Seminar</th>
            </tr>
            <tr>
                <th colspan="2 ">Shedule</th>
                <th rowspan="2">Topic</th>
            </tr>
            <tr>
                <th>Start</th>
                <th>End</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">Monday</td>
                <td rowspan="2">08:00 AM</td>
                <td rowspan="2">05:00 PM</td>
                <td>Introduction</td>
            </tr>
            <tr>
                <td>Uses</td>
            </tr>
            <tr>
                <td rowspan="4">Tuesday</td>
                <td>08:00 AM</td>
                <td>11:00 PM</td>
                <td>-</td>
            </tr>
            <tr>
                <td>11:00 AM</td>
                <td>02:00 PM</td>
                <td>Learn</td>
            </tr>
            <tr>
                <td>02:00 PM</td>
                <td>08:00 PM</td>
                <td rowspan="2">-</td>
            </tr>
            <tr>
                <td>10:00 AM</td>
                <td>01:00 PM</td>
            </tr>
            <tr>
                <td>Wed-Fri</td>
                <td colspan="2">Full Day</td>
                <td>Practical</td>
            </tr>
            <tr>
                <td>Sat-Sun</td>
                <td colspan="2">11:00 AM - 05:00 PM</td>
                <td>Extra Class</td>
            </tr>

        </tbody>
    </table>

</body>

</html>
