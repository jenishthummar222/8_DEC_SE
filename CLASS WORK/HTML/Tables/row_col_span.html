<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>

<style>
    table {
        border: 3px solid violet;
        border-collapse: collapse;
        width: 100%;
    }
    
    tr,
    td,
    th {
        border: 2px solid violet;
        padding: 5px;
        margin: auto;
    }
    
    th {
        background-color: rgb(19, 7, 38);
        color: rgb(223, 223, 223);
    }
    
    tr,
    td {
        background-color: rgba(20, 22, 26, 0.701);
        color: white;
    }
    
    body {
        background-color: rgb(223, 223, 223);
        font-size: 20px;
    }
</style>

<body>

    <table>
        <thead>
            <tr>
                <th rowspan="2">Id</th>
                <th rowspan="2">Name</th>
                <th rowspan="2">Subject</th>
                <th rowspan="2">Score</th>
                <th colspan="2">Details</th>
            </tr>
            <tr>
                <th>Email</th>
                <th>Contact</th>
            </tr>

        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Jenish</td>
                <td>Python</td>
                <td>90</td>
                <td>jenish@gmail.com</td>
                <td>7894561230</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Ram</td>
                <td>Java</td>
                <td>80</td>
                <td>ram@gmail.com</td>
                <td>0213456987</td>
            </tr>
        </tbody>
    </table>


</body>

</html>
