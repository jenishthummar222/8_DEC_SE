<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>

<style>
    table {
        border: 3px solid violet;
        border-collapse: collapse;
        width: 100%;
    }
    
    tr,
    td,
    th {
        border: 2px solid violet;
        padding: 5px;
        margin: auto;
    }
    
    th {
        background-color: rgb(19, 7, 38);
        color: rgb(223, 223, 223);
    }
    
    tr,
    td {
        background-color: rgba(5, 50, 139, 0.781);
        color: white;
    }
    
    body {
        background-color: rgb(223, 223, 223);
        font-size: 20px;
    }
</style>

<body>

    <table>
        <thead>

            <th>Id</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Score</th>

        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Jenish</td>
                <td>Python</td>
                <td>90</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Ram</td>
                <td>Java</td>
                <td>80</td>
            </tr>
        </tbody>
    </table>


</body>

</html>
