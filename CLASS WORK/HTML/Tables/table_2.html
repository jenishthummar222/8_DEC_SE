<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>

<style>
    table {
        border: 3px solid violet;
        border-collapse: collapse;
        width: 100%;
    }
    
    tr,
    td,
    th {
        border: 2px solid violet;
        padding: 5px;
        margin: auto;
    }
    
    th {
        background-color: rgb(19, 7, 38);
        color: rgb(223, 223, 223);
    }
    
    tr,
    td {
        background-color: rgba(20, 22, 26, 0.701);
        color: white;
    }
    
    body {
        background-color: rgb(223, 223, 223);
        font-size: 20px;
    }
</style>

<body>

    <table>
        <thead>
            <tr>
                <th rowspan="2">Heading</th>
                <th>Student</th>
                <th colspan="3">Details</th>
            </tr>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Roll Number</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="4">Student List</td>
                <td>1</td>
                <td>Jenish</td>
                <td>Computer Science</td>
                <td>12345</td>
            </tr>
            <tr>

                <td>2</td>
                <td>Sita</td>
                <td>Science</td>
                <td>54321</td>
            </tr>
            <tr>

                <td>3</td>
                <td>piyush</td>
                <td>Electronics</td>
                <td>98765</td>
            </tr>
            <tr>

                <td>4</td>
                <td>krishna</td>
                <td>Computer Science</td>
                <td>56789</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
